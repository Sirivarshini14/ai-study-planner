services:
  # ---- Backend (Spring Boot) ----
  - type: web
    name: studyplanner-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studyplanner-db
          property: connectionURI
      - key: DATABASE_USERNAME
        fromDatabase:
          name: studyplanner-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: studyplanner-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CORS_ORIGINS
        value: https://studyplanner-web.onrender.com
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: "8080"

  # ---- Frontend (React + Nginx) ----
  - type: web
    name: studyplanner-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon
    envVars:
      - key: REACT_APP_API_URL
        value: https://studyplanner-api.onrender.com/api

databases:
  - name: studyplanner-db
    plan: free
    region: oregon
    databaseName: studyplanner
    user: studyplanner_user
