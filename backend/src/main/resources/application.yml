spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/studyplanner}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32-chars}
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
  groq:
    api-key: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
    base-url: https://api.groq.com/openai/v1

logging:
  level:
    com.studyplanner: DEBUG
    org.springframework.security: INFO
